hotkeys:
  capture_trigger: "ctrl+alt+a"
  region_select: "ctrl+alt+r"
  toggle_overlay: "ctrl+alt+h"
  quit: "ctrl+alt+q"

capture:
  backend: "mss"
  monitor_index: 0
  region: null
  save_debug_images: false

ocr:
  backend: "tesseract"
  languages:
    - "en"
  gpu: false
  confidence_threshold: 0.3

llm:
  backend: "huggingface"
  model: "Qwen/Qwen2.5-72B-Instruct"
  base_url: "http://localhost:11434"
  api_key: null
  max_tokens: 250
  temperature: 0.1
  timeout_seconds: 15
  retry_attempts: 2
  prompt_template: |
    You are an exam assistant. Given the screen content below, respond with:
    - If MCQ: "Answer: [number/letter] - [option text]" + one sentence why.
    - If open question: direct concise answer only.
    - If code: brief explanation.
    No preamble. Be brief.

    {text}

ui:
  width: 340
  height: 200
  opacity: 0.95
  position_x: 20
  position_y: 20
  font_size: 13
  theme: "dark"
  always_on_top: true
