hotkeys:
  capture_trigger: "ctrl+alt+a"
  region_select: "ctrl+alt+r"
  toggle_overlay: "ctrl+alt+h"
  quit: "ctrl+alt+q"

capture:
  backend: "mss"
  monitor_index: 0
  region: null
  save_debug_images: false

ocr:
  backend: "tesseract"
  languages:
    - "en"
  gpu: false
  confidence_threshold: 0.5

llm:
  backend: "huggingface"
  model: "Qwen/Qwen2.5-72B-Instruct"
  base_url: "http://localhost:11434"
  api_key: null
  max_tokens: 512
  temperature: 0.3
  timeout_seconds: 30
  retry_attempts: 3
  prompt_template: |
    You are an exam assistant. Your ONLY job is to pick the correct answer.

    Look at the question and options below. Respond with ONLY:
    "Answer: [number] - [option text]"
    Then one sentence explaining why.

    If it's not a question, respond with a single concise answer.

    {text}

ui:
  width: 420
  height: 300
  opacity: 0.92
  position_x: 100
  position_y: 100
  font_size: 13
  theme: "dark"
  always_on_top: true
