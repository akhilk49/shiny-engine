hotkeys:
  capture_trigger: "ctrl+alt+a"
  region_select: "ctrl+alt+r"
  toggle_overlay: "ctrl+alt+h"
  quit: "ctrl+alt+q"

capture:
  backend: "mss"
  monitor_index: 0
  region: null
  save_debug_images: false

ocr:
  backend: "tesseract"
  languages:
    - "en"
  gpu: false
  confidence_threshold: 0.3

llm:
  backend: "huggingface"
  model: "Qwen/Qwen2.5-72B-Instruct"
  base_url: "http://localhost:11434"
  api_key: null
  max_tokens: 350
  temperature: 0.1
  timeout_seconds: 15
  retry_attempts: 2
  prompt_template: |
    You are analyzing text extracted from a screen via OCR. The text may be slightly garbled.

    STEP 1 - Identify the structure:
    - Find the main question (usually ends with "?" or is a statement asking something)
    - Find the options (usually numbered 1-4 or lettered A-D, may appear on separate lines)

    STEP 2 - Answer:
    IF it's a multiple choice question:
    Respond in exactly this format (3 lines only):
    Answer: [number or letter]
    [Full text of the correct option]
    Why: [one sentence, max 15 words]

    IF it's an open question (no options):
    Give a direct answer in 1-2 sentences.

    IF it's code:
    One line: what it does or what the bug is.

    NEVER list all options. NEVER say "based on the text". NEVER repeat the question.

    OCR TEXT:
    {text}

ui:
  width: 340
  height: 200
  opacity: 0.95
  position_x: 20
  position_y: 20
  font_size: 13
  theme: "dark"
  always_on_top: true
